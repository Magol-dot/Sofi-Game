<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <!-- CLAVE para móviles -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Juego de Adivinanzas</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .contenedor {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 350px;
      box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 15px;
    }

    input {
      padding: 12px;
      width: 100%;
      font-size: 16px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px;
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #4facfe;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:active {
      background: #00c6ff;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
    }

    #intentos {
      margin-top: 8px;
      color: gray;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="contenedor">
    <h1>🎮 Adivina la palabra</h1>

    <input type="text" id="entrada" placeholder="Escribe aquí...">

    <button onclick="verificar()">Intentar</button>

    <p id="resultado"></p>
    <p id="intentos"></p>
  </div>

  <script>
    const palabras = {
      "java": "Lenguaje de programación",
      "python": "Lenguaje muy fácil de aprender",
      "gato": "Animal doméstico",
      "colombia": "País de Latinoamérica"
    };

    let intentos = 0;

    function verificar() {
      const input = document.getElementById("entrada").value.toLowerCase().trim();
      const resultado = document.getElementById("resultado");
      const intentosTexto = document.getElementById("intentos");

      if (input === "") return;

      intentos++;

      if (palabras[input]) {
        resultado.textContent = "✅ Pista: " + palabras[input];
        resultado.style.color = "green";
      } else {
        resultado.textContent = "❌ Incorrecto";
        resultado.style.color = "red";
      }

      intentosTexto.textContent = "Intentos: " + intentos;

      document.getElementById("entrada").value = "";
    }

    // ENTER para enviar (clave en celular)
    document.getElementById("entrada").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        verificar();
      }
    });
  </script>

</body>
</html>
