<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ruta Napoleónica</title>

  <style>
    body {
      font-family: "Georgia", serif;
      background: url("https://images.unsplash.com/photo-1578926288207-a90a5366759d") no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .contenedor {
      background: rgba(255, 248, 220, 0.95);
      padding: 25px;
      border-radius: 15px;
      text-align: center;
      width: 90%;
      max-width: 420px;
      box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
      border: 3px solid #c9a44c;
    }

    h1 {
      font-size: 22px;
      color: #3b2f2f;
      margin-bottom: 10px;
    }

    #progreso {
      font-size: 14px;
      color: #6b5b4b;
      margin-bottom: 10px;
    }

    input {
      padding: 12px;
      width: 100%;
      font-size: 16px;
      margin-top: 10px;
      border-radius: 8px;
      border: 2px solid #c9a44c;
      background: #fffdf5;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #8b6f3d;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #a3834b;
    }

    #resultado {
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
    }

    #pista {
      margin-top: 10px;
      color: #5a4634;
      font-style: italic;
    }
  </style>
</head>

<body>

<div class="contenedor">
  <h1 id="titulo">🎖️ Ruta Napoleónica</h1>
  <div id="progreso">Pregunta 1 de 23</div>

  <input type="text" id="entrada" placeholder="Escribe tu respuesta">

  <button onclick="verificar()">Responder</button>

  <p id="resultado"></p>
  <p id="pista"></p>
</div>

<script>

const juego = [
  {respuesta: "napoleon", pista: "Cuadro del tercer piso"},
  {respuesta: "josefina", pista: "Balcón de la biblioteca"},
  {respuesta: "corte imperio", pista: "Fileteadora"},
  {respuesta: "muselina", pista: "Salón de textiles"},
  {respuesta: "manguito", pista: "Donde antes se vendía comida"},
  {respuesta: "estola de piel de oso", pista: "máquina expendedora sexto piso"},
  {respuesta: "epidemia de neumonia", pista: "Baño en el primer piso"},
  {respuesta: "si", pista: "Salón 6600"},
  {respuesta: "para tener hijos", pista: "Escaleras que llevan al salón de la mitad de confección"},
  {respuesta: "bandas cruzadas", pista: "Auditorio"},
  {respuesta: "tipo baleta", pista: "debajo de los banquitos del sexto piso"},
  {respuesta: "abanico", pista: "Sala de espera entrada universidad debajo de la mesa"},
  {respuesta: "manga corta", pista: "Una de las mesitas de luz"},
  {respuesta: "mas bajos", pista: "Lockers del tercer piso"},
  {respuesta: "mas sencillez", pista: "Enfermería"},
  {respuesta: "plumas", pista: "Televisores de los pasillos"},
  {respuesta: "1820", pista: "Escaleras al sexto piso"},
  {respuesta: "alambre", pista: "Cerca al microondas"},
  {respuesta: "cenidores", pista: "Mesas del sexto piso"},
  {respuesta: "verde rosa azul vino tinto rojo", pista: "Gabardina azul en salón de confección"},
  {respuesta: "rojo", pista: "Debajo del teclado en biblioteca"},
  {respuesta: "reloj de cadena", pista: "Banquito frente al salón de confección"},
  {respuesta: "witchoura", pista: "🎁 Vuelve por tu premio"}
];

let nivel = 0;

function normalizar(texto) {
  return texto.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function verificar() {
  const input = normalizar(document.getElementById("entrada").value);
  const correcto = normalizar(juego[nivel].respuesta);

  const resultado = document.getElementById("resultado");
  const pista = document.getElementById("pista");
  const progreso = document.getElementById("progreso");

  if (input === correcto) {
    nivel++;

    if (nivel === juego.length) {
      document.getElementById("titulo").textContent = "🏆 ¡Misión completada!";
      resultado.textContent = "Has terminado la Ruta Napoleónica";
      pista.textContent = "";
      progreso.textContent = "";
      return;
    }

    resultado.textContent = "✅ Correcto";
    resultado.style.color = "green";

    pista.textContent = "📍 " + juego[nivel].pista;
    progreso.textContent = "Pregunta " + (nivel + 1) + " de " + juego.length;

  } else {
    resultado.textContent = "❌ Incorrecto";
    resultado.style.color = "red";
  }

  document.getElementById("entrada").value = "";
}

// Enter
document.getElementById("entrada").addEventListener("keypress", function(e) {
  if (e.key === "Enter") verificar();
});

</script>

</body>
</html>
